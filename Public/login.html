<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        .box {
            background: white;
            padding: 30px;
            margin-top: 100px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #c00505, #d40e0e);
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // 🔐 SIMPLE LOGIN CHECK
    if (user === "admin" && pass === "admin123") {
        localStorage.setItem("admin", "true");
        window.location.href = "admin.html";
    } else {
        alert("Invalid credentials");
    }
}
</script>

</body>
</html>
