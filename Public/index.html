<!DOCTYPE html>
<html>
<head>
    <title>Student Support System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
        }

        h1 {
            margin-top: 50px;
            color: #333;
        }

        .container {
            margin-top: 60px;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 30px;
            margin: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card h2 {
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background:  linear-gradient(135deg, #c00505, #d40e0e);
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <h1>🎓 Student Support Chatbot System</h1>

    <div class="container">

        <!-- Chatbot -->
        <div class="card">
            <h2>💬 Chatbot</h2>
            <p>Ask questions and get instant help</p>
            <a href="chat.html" class="btn">Open Chatbot</a>
        </div>

        <!-- Admin -->
        <div class="card">
            <h2>⚙️ Admin Panel</h2>
            <p>Manage FAQs and content</p>
            <a href="login.html" class="btn">Go to Admin</a>
        </div>

    </div>

</body>
</html>
